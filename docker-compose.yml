version: "3.8"

services:
  nebula-panel:
    build: .
    image: nebula-panel:latest
    container_name: nebula-panel
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - nebula-data:/data
    environment:
      - DB_PATH=/data/nebula.db
      - LISTEN=:3000
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      # - JWT_SECRET=your-custom-secret

volumes:
  nebula-data:
